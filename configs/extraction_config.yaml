extraction:
  raw_dir: "data/raw"
  output_dir: "data/extracted"
  temp_dir: "data/temp"

  pymupdf:
    extract_images: true
    extract_tables: true
    dpi: 300
    image_format: "png"

  doctr:
    det_arch: "db_resnet50"
    reco_arch: "crnn_vgg16_bn"
    device: "cuda"
    pretrained: true
    use_for_images: true
    use_for_scanned: true

  math_ocr:
    enabled: true
    device: "cuda"
    model_id: "OleehyO/latex-formulas"
    model_subfolder: "fine-tuned-model"

  preprocessing:
    remove_headers_footers: true
    normalize_whitespace: true
    merge_hyphenated_words: true
    extract_urls: true
    extract_emails: true
